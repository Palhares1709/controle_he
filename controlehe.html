<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbz5ayFREdvcm72hRuKPSLXXNCzvSFS_nHB3r4CLjyhMfZkSDAiBgvs8UCRQa9IxQGnB7w/exec";

    // FUNÇÃO QUE SUBSTITUI O google.script.run NO GITHUB
    function executarNoGoogle(nomeFuncao, parametros, callbackSucesso, callbackErro) {
      const form = new FormData();
      form.append('funcao', nomeFuncao);
      form.append('dados', JSON.stringify(parametros));

      fetch(URL_SCRIPT, {
        method: 'POST',
        body: form
      })
      .then(res => res.json())
      .then(res => {
        if (callbackSucesso) callbackSucesso(res);
      })
      .catch(err => {
        if (callbackErro) callbackErro(err);
        console.error("Erro na comunicação:", err);
      });
    }

    // EXEMPLO DE COMO VOCÊ VAI CHAMAR O LOGIN AGORA:
    function verificarLogin() {
      const user = document.getElementById('usuario').value;
      const pass = document.getElementById('senha').value;
      
      // Em vez de google.script.run.verificarLogin...
      executarNoGoogle('verificarLogin', {u: user, s: pass}, (r) => {
        if(r.success) {
           Swal.fire('Sucesso!', 'Acesso liberado', 'success');
           // seu código para mostrar a tela principal...
        } else {
           Swal.fire('Erro', 'Usuário ou senha inválidos', 'error');
        }
      });
    }

    // Você deve repetir essa lógica para as funções salvar() e buscar()
  </script>
</body>
</html>
